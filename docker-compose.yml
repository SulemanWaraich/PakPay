version: "3.9"
services:
  user-app:
    image: suleman100devx/pakpay-user-app:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.user
      args:
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:5000}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
    ports:
      - "3005:3000"
    env_file:
      - .env
    environment:
      BANK_WEBHOOK_URL: ${BANK_WEBHOOK_URL:-http://bank-webhook:3003}
    depends_on:
      - bank-webhook
    networks:
      - pakpay-network

  bank-webhook:
    image: suleman100devx/pakpay-bank-webhook:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.bank-webhook
    ports:
      - "4000:3003"
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    networks:
      - pakpay-network

  socket-gateway:
    image: suleman100devx/pakpay-socket-gateway:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.socket-gateway
    container_name: notification-server
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      PORT: "5000"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost:3005}
    networks:
      - pakpay-network

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pakpay-network

volumes:
  redis-data:

networks:
  pakpay-network:
    driver: bridge