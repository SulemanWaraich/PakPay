version: "3.9"
services:
  user-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.user
    ports:
      - "3005:3000"
    env_file:
      - ./packages/db/.env
    environment:
      - NEXT_PUBLIC_SOCKET_URL=http://socket-gateway:5000
    depends_on:
      - bank-webhook
    networks:
      - pakpay-network

  bank-webhook:
    build:
      context: .
      dockerfile: docker/Dockerfile.bank-webhook
    ports:
      - "4000:3003"
    env_file:
      - ./packages/db/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - pakpay-network

  socket-gateway:
    build: 
      context: .
      dockerfile: docker/Dockerfile.socket-gateway
    container_name: notification-server
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=http://localhost:3005

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:

networks:
  pakpay-network:
    driver: bridge