name: Build and Deploy to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Check Out Repo
      uses: actions/checkout@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push user-app
      uses: docker/build-push-action@v2
      with:
        context: .
        file: ./docker/Dockerfile.user
        push: true
        tags: suleman100devx/pakpay:latest  # Replace with your Docker Hub username and repository
        build-args: |
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          PRISMA_ACCELERATE_URL=${{ secrets.PRISMA_ACCELERATE_URL }}

    - name: Build and Push bank-webhook
      uses: docker/build-push-action@v2
      with:
        context: .
        file: ./docker/Dockerfile.bank-webhook
        push: true
        tags: suleman100devx/pakpay-bank-webhook:latest
        build-args: |
          DATABASE_URL=${{ secrets.DATABASE_URL }}

    - name: Verify Pushed Image
      run: |
        docker pull suleman100devx/pakpay:latest  # Replace with your Docker Hub username and repository
        docker pull suleman100devx/pakpay-bank-webhook:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        script: |
          sudo docker pull suleman100devx/pakpay:latest
          sudo docker stop web-app || true
          sudo docker rm web-app || true
          sudo docker run -d --name web-app --restart always -p 3005:3000 --env-file .env suleman100devx/pakpay:latest

          sudo docker pull suleman100devx/pakpay-bank-webhook:latest
          sudo docker stop bank-webhook || true
          sudo docker rm bank-webhook || true
          sudo docker run -d --name bank-webhook --restart always -p 4000:3003 --env-file .env suleman100devx/pakpay-bank-webhook:latest