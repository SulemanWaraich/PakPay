name: Build and Deploy with Docker Compose

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Compose Images
        env:
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          SOCKET_CORS_ORIGIN: ${{ secrets.SOCKET_CORS_ORIGIN }}
        run: |
          # Build and push images defined in docker-compose.yml
          docker compose -f docker-compose.yml build --push

      - name: Verify Pushed Images
        run: |
          docker compose -f docker-compose.yml pull

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ec2-user/PakPay || exit 1

            # Write production .env file from secrets
            cat > .env << 'EOF'
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            SOCKET_CORS_ORIGIN=${{ secrets.SOCKET_CORS_ORIGIN }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            BANK_WEBHOOK_URL=${{ secrets.BANK_WEBHOOK_URL }}
            EOF

            # Pull latest images via docker-compose
            docker compose -f docker/docker-compose.yml pull

            # Stop and remove old containers
            docker compose -f docker/docker-compose.yml down

            # Start containers with updated images
            docker compose -f docker/docker-compose.yml up -d --remove-orphans