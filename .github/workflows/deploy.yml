name: Build and Deploy with Docker Compose

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run db:generate:no-engine

      - name: Unit tests
        run: npm test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Compose Images
        env:
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          SOCKET_CORS_ORIGIN: ${{ secrets.SOCKET_CORS_ORIGIN }}
        run: |
          docker compose -f docker-compose.yml build --push

      - name: Verify Pushed Images
        run: |
          docker compose -f docker-compose.yml pull

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ec2-user/PakPay || exit 1

            cat > .env << EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            PRISMA_ACCELERATE_URL=${{ secrets.PRISMA_ACCELERATE_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            SOCKET_CORS_ORIGIN=${{ secrets.SOCKET_CORS_ORIGIN }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            BANK_WEBHOOK_URL=${{ secrets.BANK_WEBHOOK_URL }}
            BANK_WEBHOOK_SECRET=${{ secrets.BANK_WEBHOOK_SECRET }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            CRON_SECRET=${{ secrets.CRON_SECRET }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            ENFORCE_HTTPS=${{ secrets.ENFORCE_HTTPS }}
            ENABLE_HSTS=${{ secrets.ENABLE_HSTS }}
            EOF

            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml down
            docker compose -f docker-compose.yml up -d --no-build --remove-orphans
